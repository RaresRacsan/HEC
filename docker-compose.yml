services:
  livekit:
    image: livekit/livekit-server:latest
    command: --dev --bind 0.0.0.0
    ports:
      - "7880:7880"
      - "7881:7881"
      - "7882:7882/udp"
    environment:
      - "LIVEKIT_KEYS=devkey: secret"

  postgres:
    image: postgres:15-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=hec_user
      - POSTGRES_PASSWORD=hec_password
      - POSTGRES_DB=hec_db
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
