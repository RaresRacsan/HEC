name: Deploy to Server

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 1. Navigate to the project directory on your server
            cd /home/debian/app
            
            # 2. Pull the latest code
            git pull origin main
            
            # 3. Rebuild and restart the backend containers
            docker-compose down
            docker-compose up -d --build
            
            # 4. Build the frontend
            cd frontend
            npm install
            npm run build
            
            # Note: Because Nginx serves static files directly from a directory
            # (likely /home/debian/app/frontend/dist as per /etc/nginx/sites-available/blypp.tech),
            # just running "npm run build" is enough to update the live site!
            # If your Nginx config points to a different folder, you would copy the dist folder there:
            # sudo cp -r dist/* /var/www/html/
